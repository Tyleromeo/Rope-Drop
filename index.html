<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <title>Rope Drop — Park Day Planner</title>
  <meta name="description" content="Track every ride, show, and bite at Disney parks. Your personal park day checklist." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- App shell -->
  <div id="app">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <div class="brand">
          <span class="brand-icon">🎢</span>
          <span class="brand-name">Rope Drop</span>
        </div>
        <button class="header-btn" id="trip-btn" title="My trips">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </button>
      </div>
    </header>

    <!-- Park selector -->
    <nav class="park-nav" id="park-nav" role="tablist" aria-label="Select a park"></nav>

    <!-- Main content -->
    <main class="main-content" id="main-content" role="tabpanel"></main>

    <!-- Bottom bar -->
    <div class="bottom-bar">
      <div class="progress-summary" id="progress-summary"></div>
      <button class="reset-btn" id="reset-btn">Reset park</button>
    </div>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
